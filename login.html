<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>התחברות | מפת פרויקטים - Winest Group</title>
    <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Heebo', sans-serif;
            min-height: 100vh;
            background: linear-gradient(135deg, #1a3a5c 0%, #2c5f8d 50%, #4a90c2 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .login-card {
            background: white;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            width: 100%;
            max-width: 420px;
            padding: 40px 36px;
        }

        .login-header {
            text-align: center;
            margin-bottom: 32px;
        }

        .login-header .icon {
            font-size: 48px;
            margin-bottom: 12px;
            display: block;
        }

        .login-header h1 {
            font-size: 22px;
            color: #1a3a5c;
            font-weight: 700;
            margin-bottom: 4px;
        }

        .login-header p {
            font-size: 13px;
            color: #888;
            font-weight: 400;
        }

        .form-group {
            margin-bottom: 16px;
        }

        .form-group label {
            display: block;
            font-size: 13px;
            color: #555;
            margin-bottom: 6px;
            font-weight: 500;
        }

        .form-group input {
            width: 100%;
            padding: 12px 14px;
            border: 1.5px solid #e0e0e0;
            border-radius: 8px;
            font-family: inherit;
            font-size: 14px;
            transition: border-color 0.2s, box-shadow 0.2s;
            direction: ltr;
            text-align: right;
        }

        .form-group input:focus {
            outline: none;
            border-color: #2c5f8d;
            box-shadow: 0 0 0 3px rgba(44, 95, 141, 0.1);
        }

        .submit-btn {
            width: 100%;
            padding: 13px;
            background: linear-gradient(135deg, #1a3a5c 0%, #2c5f8d 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-family: inherit;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.15s, box-shadow 0.15s;
            margin-top: 8px;
        }

        .submit-btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 6px 16px rgba(26, 58, 92, 0.3);
        }

        .submit-btn:active {
            transform: translateY(0);
        }

        .submit-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .error-message {
            background: #fee;
            color: #c33;
            padding: 10px 14px;
            border-radius: 8px;
            font-size: 13px;
            margin-bottom: 16px;
            border-right: 3px solid #c33;
            display: none;
        }

        .error-message.show { display: block; }

        .footer {
            text-align: center;
            margin-top: 24px;
            font-size: 12px;
            color: #999;
        }

        .footer a {
            color: #2c5f8d;
            text-decoration: none;
        }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="login-header">
            <span class="icon">📍</span>
            <h1>מפת פרויקטים - פאפוס</h1>
            <p>Winest Group · התחברות לחשבון</p>
        </div>

        <div id="error-message" class="error-message"></div>

        <form id="login-form">
            <div class="form-group">
                <label for="email">אימייל</label>
                <input type="email" id="email" required autocomplete="username" placeholder="your@email.com">
            </div>

            <div class="form-group">
                <label for="password">סיסמה</label>
                <input type="password" id="password" required autocomplete="current-password" placeholder="••••••••">
            </div>

            <button type="submit" class="submit-btn" id="submit-btn">התחבר</button>
        </form>

        <div class="footer">
            כלי פנימי · גישה לעובדי Winest Group בלבד
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/config.js"></script>
    <script src="js/supabase-client.js"></script>

    <script>
        // If already logged in, redirect to map
        (async () => {
            const { data: { session } } = await window.sb.auth.getSession();
            if (session) {
                window.location.href = 'index.html';
            }
        })();

        const form = document.getElementById('login-form');
        const errorBox = document.getElementById('error-message');
        const submitBtn = document.getElementById('submit-btn');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            errorBox.classList.remove('show');
            submitBtn.disabled = true;
            submitBtn.textContent = 'מתחבר...';

            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;

            const { data, error } = await window.sb.auth.signInWithPassword({
                email,
                password
            });

            if (error) {
                let msg = 'שגיאה בהתחברות';
                if (error.message.includes('Invalid login credentials')) {
                    msg = 'אימייל או סיסמה שגויים';
                } else if (error.message.includes('Email not confirmed')) {
                    msg = 'האימייל לא אושר. פנה למנהל המערכת.';
                } else {
                    msg = error.message;
                }
                errorBox.textContent = msg;
                errorBox.classList.add('show');
                submitBtn.disabled = false;
                submitBtn.textContent = 'התחבר';
                return;
            }

            window.location.href = 'index.html';
        });
    </script>
</body>
</html>
